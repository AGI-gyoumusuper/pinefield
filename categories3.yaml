filters:
  min_price: 800         # ver5.2: 人気順でも800円未満は除外（2026-07-24運用裁定・セール版へ戻す時は3000）
  max_price: 0
  sort_order: "review_desc"   # ver4.2: 人気順＝レビュー数のみで横断番付（2026-07-24運用裁定・セール版へ戻す時は "sale_first"）
  max_total_items: 10    # ver3.1: 10件体制（2026-07-19運用裁定・34→8→10 同日再裁定）
  max_per_category: 1    # ver4.2: 1棚1粒＝各カテゴリの顔役だけ（2026-07-24運用裁定・セール版へ戻す時は2）
  exclude_title_patterns:   # ver3.0: セット・複数個口・詰め合わせの除外（2026-07-19運用裁定）
    - 'セット'
    - 'まとめ買い'
    - 'まとめ売り'
    - '詰め合わせ'
    - 'アソート'
    - '福袋'
    - '(?<!\d)×\s?[2-9](?!\d)'

exclusion:
  posted_asins_file: "data/account3/asin_history.json"
  exclude_within_days: 7   # ver4.2: 人気順は7日窓（2026-07-24運用裁定・セール版へ戻す時は2）
  exclude_scraped_candidates: false   # ver4.3: 浚っただけの候補（status=scraped）は焼かない＝投稿分のみ7日出禁（2026-07-24運用裁定・セール版へ戻す時はこの行を削除）
  blocked_asins: []        # ver2.8: 恒久除外（構造を①に同期。account3固有の悪質出品者ASINが出たらここへ追記）
