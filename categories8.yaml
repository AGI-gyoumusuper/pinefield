    - 'まとめ買い'
    - 'まとめ売り'
    - '詰め合わせ'
    - 'アソート'
    - '福袋'
    - '(?<!\d)×\s?[2-9](?!\d)'

exclusion:
  posted_asins_file: "data/account8/asin_history.json"
  exclude_within_days: 7   # ver4.2: 人気順は7日窓（2026-07-24運用裁定・セール版へ戻す時は2）
