# ============================================
# 共通フィルタ（既存と同じ）
# ============================================
filters:
  min_price: 800         # ver5.2: 人気順でも800円未満は除外（2026-07-24運用裁定・セール版へ戻す時は3000）
  max_price: 0           # 0=上限なし
  sort_order: "review_desc"   # ver4.0: 各棚人気上位をレビュー数のみで横断番付（2026-07-24運用裁定＝人気カテゴリの顔役だけが上位に残る。評価★・第二鍵とも不使用＝同数は浚った順。セール版へ戻す時は "sale_first"）
  max_total_items: 10    # ver3.1: 10件体制（2026-07-19運用裁定・34→8→10 同日再裁定）
  max_per_category: 1    # ver4.0: 1棚1粒＝各カテゴリの顔役だけ（2026-07-24運用裁定。収穫は棚10件のまま＝1位が履歴休みの日は2位が繰り上がり自然回転）
  exclude_title_patterns:   # ver3.0: セット・複数個口・詰め合わせの除外（2026-07-19運用裁定）
    - 'セット'
    - 'まとめ買い'
    - 'まとめ売り'
    - '詰め合わせ'
    - 'アソート'
    - '福袋'
    - '(?<!\d)×\s?[2-9](?!\d)'

# ============================================
# 投稿済みASIN除外（既存と同じ）
# ============================================
exclusion:
  posted_asins_file: "data/account1/asin_history.json"
  exclude_within_days: 7   # ver4.1: 人気順運転は7日窓（2026-07-24運用裁定＝人気の顔ぶれは不動ゆえ2日では3日周期で再登場する）。セール版へ戻す時は2。履歴は投稿後に scripts/sync_asin_history1.ps1 で更新
  exclude_scraped_candidates: false   # ver4.3: 浚っただけの候補（status=scraped）は焼かない＝投稿分のみ7日出禁（2026-07-24運用裁定・セール版へ戻す時はこの行を削除）
  blocked_asins:           # ver2.8: 恒久除外（運用裁定2026-07-12: 悪質出品者のカテゴリ誤登録商品は二度と扱わない）
    - "B0GP6FV63C"   # 女性服「ドッキングペプラムカットソー」がドッキングステーションに誤登録（7/9・7/12混入）
    - "B0GPVVG6VN"   # 同商品のバリエーションASIN（保険）
